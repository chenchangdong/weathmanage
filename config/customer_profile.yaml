# 客户画像定义 — 五档风险等级
version: "1.1"

risk_levels:
  conservative:
    name: 保守型
    loss_pct: 1
    score_range: [0, 20]
    description: 风险承受能力低，最大可承受本金亏损约1%
  prudent:
    name: 稳健型
    loss_pct: 3
    score_range: [21, 40]
    description: 追求稳健，最大可承受本金亏损约3%
  balanced:
    name: 平衡型
    loss_pct: 6
    score_range: [41, 60]
    description: 风险收益均衡，最大可承受本金亏损约6%
  growth:
    name: 成长型
    loss_pct: 10
    score_range: [61, 80]
    description: 接受适度波动，最大可承受本金亏损约10%
  aggressive:
    name: 进取型
    loss_pct: 15
    score_range: [81, 100]
    description: 追求长期高收益，最大可承受本金亏损约15%

