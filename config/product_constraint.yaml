# 底层产品约束
# 映射链路：产品 → asset_type(五类资产) → 四笔钱(由 four_money_mapping.yaml 派生)
# rebalance_priority: 调仓优先级 1-5（档数越低越优先；档数相同按产品 code 字典序）
version: "1.2"

# 五类资产类型说明（与 four_money_mapping.yaml asset_alias 一致）
asset_types:
  cash: 现金类
  fixed_income: 固收类
  equity: 权益类
  alternative: 另类及其他
  insurance: 保障类

products:
  # --- 现金类 → 要花的钱 ---
  - code: P000
    name: 活钱存款
    asset_type: cash
    product_subtype: demand_deposit
    rebalance_priority: 0
    min_amount: 1
    max_amount: 500000
    liquidity_days: 0
    risk_level: 1
  - code: P001
    name: 余额宝
    asset_type: cash
    product_subtype: money_market
    rebalance_priority: 2
    min_amount: 1
    max_amount: 500000
    liquidity_days: 0
    risk_level: 1
  - code: P002
    name: 活期理财
    asset_type: cash
    product_subtype: current
    rebalance_priority: 3
    min_amount: 1000
    max_amount: 200000
    liquidity_days: 0
    risk_level: 1

  # --- 固收类 → 保值的钱 ---
  - code: P003
    name: 稳健理财90天
    asset_type: fixed_income
    product_subtype: fixed_income_note
    rebalance_priority: 2
    min_amount: 5000
    max_amount: 1000000
    liquidity_days: 90
    risk_level: 2
  - code: P004
    name: 纯债基金
    asset_type: fixed_income
    product_subtype: bond_fund
    rebalance_priority: 1
    min_amount: 100
    max_amount: 2000000
    liquidity_days: 1
    risk_level: 2
  - code: P005
    name: 大额存单
    asset_type: fixed_income
    product_subtype: certificate
    rebalance_priority: 3
    min_amount: 200000
    max_amount: 5000000
    liquidity_days: 365
    risk_level: 1

  # --- 权益类 → 生钱的钱 ---
  - code: P006
    name: 混合型基金
    asset_type: equity
    product_subtype: hybrid_fund
    rebalance_priority: 2
    min_amount: 100
    max_amount: 3000000
    liquidity_days: 1
    risk_level: 3
  - code: P007
    name: 股票型基金
    asset_type: equity
    product_subtype: equity_fund
    rebalance_priority: 3
    min_amount: 100
    max_amount: 3000000
    liquidity_days: 1
    risk_level: 4
  - code: P008
    name: 指数基金
    asset_type: equity
    product_subtype: index_fund
    rebalance_priority: 1
    min_amount: 100
    max_amount: 3000000
    liquidity_days: 1
    risk_level: 4

  # --- 另类及其他 → 生钱的钱（示例产品，与权益同属 grow_asset）---
  - code: P011
    name: 黄金ETF
    asset_type: alternative
    product_subtype: commodity_etf
    rebalance_priority: 4
    min_amount: 100
    max_amount: 1000000
    liquidity_days: 1
    risk_level: 3

  # --- 保障类 → 保障的钱 ---
  - code: P009
    name: 重疾险
    asset_type: insurance
    product_subtype: critical_illness
    rebalance_priority: 2
    min_amount: 5000
    max_amount: 100000
    liquidity_days: -1
    risk_level: 1
  - code: P010
    name: 意外险
    asset_type: insurance
    product_subtype: accident
    rebalance_priority: 3
    min_amount: 200
    max_amount: 5000
    liquidity_days: -1
    risk_level: 1
  - code: P012
    name: 寿险
    asset_type: insurance
    product_subtype: life
    rebalance_priority: 1
    min_amount: 5000
    max_amount: 500000
    liquidity_days: -1
    risk_level: 1