version: '1.0'
page:
  title: 投后陪伴体系
  subtitle: 自动化监测市场与产品异动，生成客户经理应对策略与客户沟通话术
companion:
  stream_enabled: false
tag_legend:
  warning:
    label: 【预警】
    description: 提示风险并给出应对建议（如引导卖出，最好结合买入建议）
  soothe:
    label: 【安抚】
    description: 安抚客户情绪，保持持仓稳定
  value_add:
    label: 【增值】
    description: 提供服务增强客户信任与持有体验
research_driven:
  title: 投研区
  target_customer: 所有客户
  rules:
  - id: rd_ashares
    layer: 资产
    coverage: A股（沪深300、中证500、中证1000、中证红利等）
    indicator: 沪深300/中证500/中证1000/中证红利等日内跌幅≥3.0%
    tags:
    - warning
    - soothe
    script_direction: 流量模版——长期观点、短中期观点、应对策略
    enabled: true
  - id: rd_hk
    layer: 资产
    coverage: 港股
    indicator: 恒生指数日内跌幅≥3.0%；恒生科技日内跌幅≥4.0%
    tags:
    - warning
    - soothe
    script_direction: 流量模版——长期观点、短中期观点、应对策略
    enabled: true
  - id: rd_us
    layer: 资产
    coverage: 美股
    indicator: 标普500/纳斯达克日内跌幅≥3.0%
    tags:
    - warning
    - soothe
    script_direction: 流量模版——长期观点、短中期观点、应对策略
    enabled: true
  - id: rd_bond
    layer: 资产
    coverage: 国内债券
    indicator: 10年国债期货价格连续下跌>0.1%
    tags:
    - warning
    - soothe
    script_direction: 流量模版——长期观点、短中期观点、应对策略
    enabled: true
  - id: rd_gold
    layer: 资产
    coverage: 贵金属-黄金
    indicator: COMEX/沪金日内跌幅≥3.0%
    tags:
    - warning
    - soothe
    script_direction: 流量模版——长期观点、短中期观点、应对策略
    enabled: true
  - id: rd_commodity
    layer: 资产
    coverage: 商品-大宗商品期货
    indicator: 能源/黑色/有色/农产品/化工等多品种单日跌幅>3.0%
    tags:
    - warning
    - soothe
    script_direction: 流量模版——长期观点、短中期观点、应对策略
    enabled: true
  - id: rd_quant
    layer: 量化指标
    coverage: 量化指标
    indicator: 监管政策变化或策略拥挤度因成交量骤降等引发异常
    tags:
    - warning
    - soothe
    script_direction: 流量模版——长期观点、短中期观点、应对策略
    enabled: true
  - id: rd_macro
    layer: 宏观
    coverage: 宏观
    indicator: 货币政策等重大变化
    tags:
    - warning
    - soothe
    script_direction: 流量模版——长期观点、短中期观点、应对策略
    enabled: true
  - id: rd_strategy_cta
    layer: 策略
    coverage: CTA/T0/中性/套利等
    indicator: 规则变化、流动性/成交量异常等
    tags:
    - warning
    - soothe
    script_direction: 流量模版——长期观点、短中期观点、应对策略
    enabled: true
  - id: rd_strategy_snowball
    layer: 策略
    coverage: 雪球
    indicator: 规则变化、敲入敲出距离、流动性/成交量异常等
    tags:
    - warning
    - soothe
    script_direction: 流量模版——长期观点、短中期观点、应对策略
    enabled: true
product_driven:
  title: 产品区
  target_customer: 持仓客户
  rules:
  - id: pd_perf_outperform
    layer: 特别事项
    coverage: 业绩投顾
    indicator: 连续3个月跑赢市场指数或业绩基准
    tags:
    - value_add
    script_direction: 宣传造势，帮助客户建立信心并追加投资
    enabled: true
  - id: pd_sector_inflow
    layer: 特别事项
    coverage: 宣推/流入
    indicator: 特定板块（如AI、新能源）3日上涨或资金流入，且客户持有相关基金
    tags:
    - value_add
    script_direction: 宣传造势，帮助客户建立信心并追加投资
    enabled: true
  - id: pd_dd_active_quant_cta
    layer: 业绩回撤
    coverage: 积极看多-量化/CTA
    indicator: 单周回撤≥2.0%；最大回撤≥3.0%
    tags:
    - warning
    - soothe
    script_direction: 对比市场与产品表现，给出持有/调整建议（如「宏观策略变了，我们产品怎么样？」）
    enabled: true
  - id: pd_dd_active_dividend
    layer: 业绩回撤
    coverage: 积极看多-红利
    indicator: 单周回撤≥3.0%；最大回撤≥5.0%
    tags:
    - warning
    - soothe
    script_direction: 对比市场与产品表现，给出持有/调整建议（如「宏观策略变了，我们产品怎么样？」）
    enabled: true
  - id: pd_dd_active_subjective_long
    layer: 业绩回撤
    coverage: 积极看多-主观多头
    indicator: 单周回撤≥5.0%；最大回撤≥8.0%
    tags:
    - warning
    - soothe
    script_direction: 对比市场与产品表现，给出持有/调整建议（如「宏观策略变了，我们产品怎么样？」）
    enabled: true
  - id: pd_dd_active_multi
    layer: 业绩回撤
    coverage: 积极看多-多策略
    indicator: 单周回撤≥4.0%；最大回撤≥6.0%
    tags:
    - warning
    - soothe
    script_direction: 对比市场与产品表现，给出持有/调整建议（如「宏观策略变了，我们产品怎么样？」）
    enabled: true
  - id: pd_dd_cautious_multi
    layer: 业绩回撤
    coverage: 谨慎看多-多策略
    indicator: 相对单周回撤≥2.0%；绝对单周回撤≥3.0%
    tags:
    - warning
    - soothe
    script_direction: 对比市场与产品表现，给出持有/调整建议（如「宏观策略变了，我们产品怎么样？」）
    enabled: true
  - id: pd_dd_cautious_preferred_stock
    layer: 业绩回撤
    coverage: 谨慎看多-优选股票
    indicator: 单周回撤≥5.0%
    tags:
    - warning
    - soothe
    script_direction: 对比市场与产品表现，给出持有/调整建议（如「宏观策略变了，我们产品怎么样？」）
    enabled: true
  - id: pd_dd_low_corr_cta
    layer: 业绩回撤
    coverage: 低相关-CTA
    indicator: 单周回撤≥3.0%
    tags:
    - warning
    - soothe
    script_direction: 对比市场与产品表现，给出持有/调整建议（如「宏观策略变了，我们产品怎么样？」）
    enabled: true
  - id: pd_dd_low_corr_t0_neutral
    layer: 业绩回撤
    coverage: 低相关-T0/中性
    indicator: 单周回撤≥1.5%
    tags:
    - warning
    - soothe
    script_direction: 对比市场与产品表现，给出持有/调整建议（如「宏观策略变了，我们产品怎么样？」）
    enabled: true
  - id: pd_dd_fixed_income_like
    layer: 业绩回撤
    coverage: 类固收
    indicator: 单周回撤≥1.0%
    tags:
    - warning
    - soothe
    script_direction: 对比市场与产品表现，给出持有/调整建议（如「宏观策略变了，我们产品怎么样？」）
    enabled: true
  - id: pd_dd_discretionary_a
    layer: 业绩回撤
    coverage: 类全委/白金类全委-A档
    indicator: 最大回撤≥2.0%（A档，参考阈值区间2%-5%）
    tags:
    - warning
    - soothe
    script_direction: 对比市场与产品表现，给出持有/调整建议（如「宏观策略变了，我们产品怎么样？」）
    enabled: true
  - id: pd_dd_discretionary_b
    layer: 业绩回撤
    coverage: 类全委/白金类全委-B档
    indicator: 最大回撤≥7.0%
    tags:
    - warning
    - soothe
    script_direction: 对比市场与产品表现，给出持有/调整建议（如「宏观策略变了，我们产品怎么样？」）
    enabled: true
  - id: pd_dd_discretionary_c
    layer: 业绩回撤
    coverage: 类全委/白金类全委-C档
    indicator: 最大回撤≥9.0%
    tags:
    - warning
    - soothe
    script_direction: 对比市场与产品表现，给出持有/调整建议（如「宏观策略变了，我们产品怎么样？」）
    enabled: true
  - id: pd_return_target
    layer: 其他
    coverage: 收益目标
    indicator: 到期前1个月检视是否达成收益目标
    tags:
    - warning
    - soothe
    - value_add
    script_direction: 说明目标达成情况与后续安排
    enabled: true
  - id: pd_suixinding
    layer: 其他
    coverage: 随心定
    indicator: 根据投研结论触发产品层面关注事项
    tags:
    - warning
    - soothe
    script_direction: 结合产品结构与客户持仓说明风险与应对
    enabled: true
  - id: pd_snowball
    layer: 其他
    coverage: 雪球
    indicator: 根据投研结论触发产品层面关注事项（敲入/敲出/流动性等）
    tags:
    - warning
    - soothe
    script_direction: 结合产品结构与客户持仓说明风险与应对
    enabled: true
