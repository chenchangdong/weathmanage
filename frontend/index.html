<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户资产配置 - 四笔钱智能投顾</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>智能资配</h1>
      <p>人人都是专业财富顾问</p>
    </div>

    <div id="navBar" class="nav-bar"></div>

    <div class="customer-select">
      <label for="customerSelect">选择客户：</label>
      <select id="customerSelect"></select>
      <label for="planningTypeSelect">规划类型：</label>
      <select id="planningTypeSelect"></select>
    </div>
    <div id="mappingBanner" class="mapping-banner" style="display:none"></div>

    <div id="loading" class="loading">加载中...</div>

    <div id="content" style="display:none">
      <!-- 顶部总资产卡片 -->
      <div class="total-card" id="totalCard">
        <div class="total-card-health-status" id="healthStatus">
          <span class="health-dot"></span>
          <span id="healthLabel">--</span>
        </div>
        <div class="label">总资产</div>
        <div class="amount" id="totalAssets">--</div>
        <div class="meta">
          <span id="idleCash">闲置资金 --</span>
          <button type="button" class="btn btn-ai-explain" id="btnAiHealthDiagnose">AI资配解读</button>
        </div>
      </div>

      <!-- 四大卡片 -->
      <div class="category-grid" id="categoryGrid"></div>

      <!-- 全局按钮 -->
      <div class="global-actions">
        <button class="btn btn-primary btn-large" id="btnFullOptimize">全账户一键智能最优配置</button>
        <button class="btn btn-secondary btn-large" id="btnGenerateExplain">生成配置解读</button>
      </div>
    </div>
  </div>

  <!-- 人工微调弹窗 -->
  <div class="modal-overlay" id="tweakModal">
    <div class="modal">
      <h3>人工微调 — <span id="tweakCategoryName"></span></h3>
      <div class="form-group">
        <label>大类目标金额（元）</label>
        <input type="number" id="tweakAmount" min="0" step="1000">
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="tweakConfirm">确认并重算</button>
        <button class="btn btn-secondary" id="tweakCancel">取消</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/common.js"></script>
  <script src="js/advisor_chat.js"></script>
  <script>
    let overviewData = null;
    let planData = null;
    let tweakCategory = null;

    renderNav('index');
    initCustomerSelect(loadOverview);
    AdvisorChat.init();

    async function loadOverview() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('content').style.display = 'none';
      try {
        const cid = getCustomerId();
        const cat = encodeURIComponent(getProductCategory());
        const res = await apiGet(`/api/asset/overview?customer_id=${cid}&product_category=${cat}`);
        overviewData = res.data;
        renderOverview(overviewData);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (e) {
        document.getElementById('loading').textContent = '加载失败: ' + e.message;
      }
    }

    function renderOverview(data) {
      const m = data.allocation_mapping;
      const banner = document.getElementById('mappingBanner');
      if (m) {
        banner.style.display = 'block';
        banner.innerHTML = renderMappingBannerHtml(data);
      } else {
        banner.style.display = 'none';
      }

      document.getElementById('totalAssets').textContent = formatMoney(data.total_assets);
      document.getElementById('idleCash').textContent = '闲置资金 ' + formatMoney(data.idle_cash);
      const status = document.getElementById('healthStatus');
      status.style.color = data.health.color;
      document.getElementById('healthLabel').textContent = data.health.label;

      const grid = document.getElementById('categoryGrid');
      grid.innerHTML = data.categories.map(cat => `
        <div class="category-card ${cat.category}">
          <div class="card-title">
            <span>${cat.category_name}</span>
            <span class="card-title-meta ${cat.in_band ? 'deviation-ok' : 'deviation-warn'}" title="当前占比（模型区间）">
              <span class="card-title-ratio">${formatPct(cat.current_ratio)}</span>
              <span class="card-title-band">(${formatBandRange(cat.band)})</span>
            </span>
          </div>
          <div class="field"><span>当前持仓</span><span class="value">${formatMoney(cat.current_amount)}</span></div>
          <div class="field"><span>目标配置额</span><span class="value">${formatMoney(cat.target_amount)}</span></div>
          <div class="field"><span>配比偏差</span><span class="value ${cat.in_band ? 'deviation-ok' : 'deviation-warn'}">${cat.deviation_pct}</span></div>
          <div class="product-summary" onclick="toggleProducts('${cat.category}')">
            ▶ ${cat.product_summary.count}只产品 · 合计 ${formatMoney(cat.product_summary.total)}
          </div>
          <div class="product-detail" id="products-${cat.category}">
            ${cat.products.map(p => `<div class="product-row"><span>${p.name}</span><span>${formatMoney(p.amount)}</span></div>`).join('')}
          </div>
          <div class="card-actions">
            <button class="btn btn-primary" onclick="singleOptimize('${cat.category}')">一键单类智能优化</button>
            <button class="btn btn-link" onclick="openTweak('${cat.category}', '${cat.category_name}', ${cat.target_amount})">人工微调</button>
          </div>
        </div>
      `).join('');
    }

    function toggleProducts(cat) {
      const el = document.getElementById('products-' + cat);
      el.classList.toggle('open');
    }

    async function singleOptimize(category) {
      showToast('正在优化 ' + category + '...');
      try {
        const res = await apiPost('/api/allocation/auto_rebalance', {
          customer_id: getCustomerId(),
          product_category: getProductCategory(),
          mode: 'smart_one_click',
          target_category: category,
        });
        saveResult(res.data);
        window.location.href = 'result.html';
      } catch (e) {
        showToast('优化失败: ' + e.message);
      }
    }

    function openTweak(category, name, amount) {
      tweakCategory = category;
      document.getElementById('tweakCategoryName').textContent = name;
      document.getElementById('tweakAmount').value = Math.round(amount);
      document.getElementById('tweakModal').classList.add('open');
    }

    document.getElementById('tweakCancel').onclick = () => {
      document.getElementById('tweakModal').classList.remove('open');
    };

    document.getElementById('tweakConfirm').onclick = async () => {
      const amount = parseFloat(document.getElementById('tweakAmount').value);
      if (isNaN(amount) || amount < 0) { showToast('请输入有效金额'); return; }
      document.getElementById('tweakModal').classList.remove('open');
      showToast('人工微调重算中...');
      try {
        const res = await apiPost('/api/allocation/auto_rebalance', {
          customer_id: getCustomerId(),
          product_category: getProductCategory(),
          mode: 'manual_tweak',
          manual_overrides: { [tweakCategory]: amount },
          locked_categories: [tweakCategory],
        });
        saveResult(res.data);
        window.location.href = 'result.html';
      } catch (e) {
        showToast('重算失败: ' + e.message);
      }
    };

    document.getElementById('btnFullOptimize').onclick = async () => {
      showToast('全账户智能配仓计算中...');
      try {
        const res = await apiPost('/api/allocation/auto_rebalance', {
          customer_id: getCustomerId(),
          product_category: getProductCategory(),
          mode: 'smart_one_click',
        });
        saveResult(res.data);
        window.location.href = 'result.html';
      } catch (e) {
        showToast('配仓失败: ' + e.message);
      }
    };

    document.getElementById('btnGenerateExplain').onclick = async () => {
      showToast('生成配置解读...');
      try {
        const res = await apiPost('/api/allocation/auto_rebalance', {
          customer_id: getCustomerId(),
          product_category: getProductCategory(),
          mode: 'smart_one_click',
        });
        saveResult(res.data);
        window.location.href = 'result.html#explain';
      } catch (e) {
        showToast('生成失败: ' + e.message);
      }
    };
  </script>
</body>
</html>
