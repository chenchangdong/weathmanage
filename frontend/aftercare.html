<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投后陪伴 - 四笔钱智能投顾</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/advisor_chat_bootstrap.js"></script>
</head>
<body class="page-aftercare" data-advisor-dock>
  <div class="container">
    <div class="page-header">
      <h1>投后陪伴</h1>
      <p>自动监测市场与产品异动 · 点击 AI 辅助胶囊，在智能顾问中生成应对策略与沟通话术</p>
    </div>

    <div id="navBar" class="nav-bar"></div>

    <div class="customer-select">
      <label for="customerSelect">选择客户：</label>
      <select id="customerSelect"></select>
      <span id="monitorDate" class="aftercare-date"></span>
    </div>

    <div id="loading" class="loading">正在检测异动…</div>
    <div id="content" style="display:none">

      <div class="aftercare-zone aftercare-zone--research">
        <div class="aftercare-zone-header">
          <h2 id="researchTitle">投研区</h2>
          <span id="researchTarget" class="aftercare-target"></span>
        </div>
        <p class="aftercare-zone-desc">市场整体情况，不针对单一客户</p>
        <div id="researchItems" class="aftercare-items"></div>
      </div>

      <div class="aftercare-zone aftercare-zone--product">
        <div class="aftercare-zone-header">
          <h2 id="productTitle">产品区</h2>
          <span id="productTarget" class="aftercare-target"></span>
        </div>
        <p class="aftercare-zone-desc">与客户持仓相关的产品层面异动</p>
        <div id="productItems" class="aftercare-items"></div>
      </div>

      <div class="aftercare-actions">
        <button class="btn btn-primary" id="btnExport">导出已生成话术</button>
        <button class="btn btn-secondary" id="btnRefresh">刷新预警</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/common.js"></script>
  <script src="js/advisor_chat.js"></script>
  <script>
    renderNav('aftercare');
    initCustomerSelect(loadMonitor, { skipPlanningType: true });

    let monitorData = null;
    const generated = {};

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }

    function itemKey(zone, ruleId, field) {
      return `${zone}:${ruleId}:${field}`;
    }

    function renderTags(tags) {
      return (tags || []).map(t =>
        `<span class="aftercare-tag aftercare-tag--${t.key}">${esc(t.label)}</span>`
      ).join('');
    }

    function aiCapsuleRow(zone, ruleId, field, label) {
      return `<div class="aftercare-ai-block" data-key="${esc(itemKey(zone, ruleId, field))}">
        <div class="aftercare-ai-block-head">
          <span class="aftercare-ai-block-label">${esc(label)}</span>
          <button type="button" class="aftercare-ai-capsule"
            data-zone="${esc(zone)}" data-rule-id="${esc(ruleId)}" data-field="${esc(field)}">
            ✨ AI辅助生成
          </button>
        </div>
      </div>`;
    }

    function itemCardHtml(zone, item, index) {
      const ruleId = item.rule_id || String(index);
      return `<div class="aftercare-item" id="item-${esc(zone)}-${esc(ruleId)}">
        <div class="aftercare-alert-item">
          <div class="aftercare-alert-head">
            <strong>${esc(item.layer || '')}</strong> · ${esc(item.coverage || '')}
            <span class="aftercare-alert-tags">${renderTags(item.tags)}</span>
          </div>
          <div class="aftercare-alert-indicator">${esc(item.indicator || '')}</div>
          <div class="aftercare-alert-detail">${esc(item.mock_detail || '')}</div>
        </div>
        ${aiCapsuleRow(zone, ruleId, 'advisor_strategy', '客户经理应对策略')}
        ${aiCapsuleRow(zone, ruleId, 'customer_script', '客户沟通话术')}
      </div>`;
    }

    function zoneContainerId(zone) {
      return zone === 'research' ? 'researchItems' : 'productItems';
    }

    function renderZoneEmpty(zone) {
      document.getElementById(zoneContainerId(zone)).innerHTML =
        '<div class="aftercare-alert-empty">今日暂无触发预警</div>';
    }

    function bindAftercareCapsules() {
      AdvisorChat.bindLinkedSelector('.aftercare-ai-capsule', {
        userLabel: 'AI辅助生成',
        busyLabel: '生成中…',
        getLinkedParams: (btn) => ({
          aftercare: {
            zone: btn.dataset.zone,
            rule_id: btn.dataset.ruleId,
            field: btn.dataset.field,
          },
        }),
        onComplete: (result, btn) => {
          const key = itemKey(btn.dataset.zone, btn.dataset.ruleId, btn.dataset.field);
          generated[key] = { content: result.reply, source: result.source };
        },
      });
    }

    function renderMonitor(data) {
      monitorData = data;
      document.getElementById('monitorDate').textContent = `监测日期：${data.date || '--'}`;

      const rzMeta = data.research_meta || {};
      const pzMeta = data.product_meta || {};
      document.getElementById('researchTitle').textContent = rzMeta.title || '投研区';
      document.getElementById('researchTarget').textContent = rzMeta.target_customer || '';
      document.getElementById('productTitle').textContent = pzMeta.title || '产品区';
      document.getElementById('productTarget').textContent = pzMeta.target_customer || '';

      const research = data.research_alerts || [];
      const product = data.product_alerts || [];

      if (!research.length) renderZoneEmpty('research');
      else {
        document.getElementById('researchItems').innerHTML =
          research.map((item, i) => itemCardHtml('research', item, i)).join('');
      }

      if (!product.length) renderZoneEmpty('product');
      else {
        document.getElementById('productItems').innerHTML =
          product.map((item, i) => itemCardHtml('product', item, i)).join('');
      }

      bindAftercareCapsules();
    }

    async function loadMonitor() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').textContent = '正在检测异动…';
      document.getElementById('content').style.display = 'none';
      Object.keys(generated).forEach(k => delete generated[k]);

      try {
        const res = await apiGet('/api/aftercare/monitor?customer_id=' + encodeURIComponent(getCustomerId()));
        renderMonitor(res.data);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (e) {
        document.getElementById('loading').textContent = '加载失败: ' + e.message;
      }
    }

    document.getElementById('btnRefresh').onclick = loadMonitor;

    document.getElementById('btnExport').onclick = () => {
      if (!monitorData) return;
      const keys = Object.keys(generated);
      if (!keys.length) {
        showToast('暂无已生成话术，请先在智能顾问中生成');
        return;
      }

      let text = `# 投后陪伴 - ${monitorData.customer_name} (${monitorData.date})\n\n`;
      const sections = [
        { zone: 'research', title: monitorData.research_meta?.title || '投研区', alerts: monitorData.research_alerts || [] },
        { zone: 'product', title: monitorData.product_meta?.title || '产品区', alerts: monitorData.product_alerts || [] },
      ];

      sections.forEach(sec => {
        text += `## ${sec.title}\n\n`;
        sec.alerts.forEach((item, i) => {
          const rid = item.rule_id || String(i);
          const strat = generated[itemKey(sec.zone, rid, 'advisor_strategy')];
          const script = generated[itemKey(sec.zone, rid, 'customer_script')];
          if (!strat && !script) return;
          text += `### 预警 ${i + 1}：${item.coverage || rid}\n`;
          text += `- 异动：${item.mock_detail || item.indicator || ''}\n\n`;
          if (strat) text += `#### 客户经理应对策略\n${strat.content}\n\n`;
          if (script) text += `#### 客户沟通话术\n${script.content}\n\n`;
        });
      });

      const blob = new Blob([text], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `companion_${monitorData.customer_id}_${monitorData.date}.md`;
      a.click();
      showToast('话术已导出');
    };

    AdvisorChat.initDockPage({ bindHealthDiagnose: false, bindPlanExplain: false });
  </script>
</body>
</html>
