<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>财富盘点 - 智能资配系统</title>
  <link rel="stylesheet" href="css/app-shell.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/advisor_chat_bootstrap.js"></script>
</head>
<body class="page-wealth-journey" data-advisor-dock>
  <div class="container container-wealth">
    <div class="page-header">
      <h1>财富盘点</h1>
      <p>场景化发现需干预客户，从问题切入而非直接配置</p>
    </div>

    <div class="journey-step-bar">
      <span class="journey-step active">① 财富盘点</span>
      <span class="journey-step-arrow">→</span>
      <span class="journey-step muted">② 资产诊断</span>
      <span class="journey-step-arrow">→</span>
      <span class="journey-step muted">③ 智能资配</span>
    </div>

    <div id="loading" class="loading">加载客户清单…</div>

    <div id="content" style="display:none">
      <div class="inventory-toolbar">
        <span class="inventory-summary" id="inventorySummary">--</span>
        <span class="inventory-hint">点击客户行进入资产诊断 · 悬停标志查看简要提示</span>
      </div>
      <div class="inventory-table-wrap">
        <table class="inventory-table">
          <thead>
            <tr>
              <th>客户</th>
              <th>风险等级</th>
              <th>总资产</th>
              <th>年化收益</th>
              <th>本月收益</th>
              <th>年化波动率</th>
              <th>本金浮亏</th>
              <th>财富健康标志</th>
            </tr>
          </thead>
          <tbody id="inventoryBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="flagTooltip" class="flag-tooltip" style="display:none" role="tooltip"></div>
  <div id="toast" class="toast"></div>

  <script src="js/common.js"></script>
  <script src="js/journey_soft_nav.js"></script>
  <script src="js/app_shell.js"></script>
  <script src="js/wealth_journey.js"></script>
  <script src="js/journey_state.js"></script>
  <script src="js/pages/wealth_inventory_page.js"></script>
  <script src="js/pages/asset_diagnosis_page.js"></script>
  <script src="js/advisor_chat.js?v=20260622b"></script>
  <script>
    initAppShell({ page: 'wealth_inventory', title: '财富盘点', crumb: '财富盘点' });
    if (typeof syncCustomerContextFromUrl === 'function') syncCustomerContextFromUrl();
    WealthJourney.initAdvisor();
    WealthInventoryPage.boot();
  </script>
</body>
</html>
