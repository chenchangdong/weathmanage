<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP产品信息库</title>
  <link rel="stylesheet" href="../css/app-shell.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .operation-header-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .tab-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 12px 0;
      border-bottom: 1px solid var(--divider);
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    .filter-bar select,
    .filter-bar input {
      height: 32px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      font-size: 13px;
      font-family: inherit;
      color: var(--fg);
    }
    .form-grid {
      display: grid;
      gap: 14px;
    }
    .form-field label {
      display: block;
      font-size: 12px;
      color: var(--fg-3);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      background: var(--card);
      color: var(--fg);
    }
    .form-field textarea {
      min-height: 72px;
      resize: vertical;
    }
    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
      font-size: 12.5px;
      color: var(--fg-3);
    }
    .table-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-link.danger { color: var(--red); }
    .empty-cell { text-align: center; color: var(--fg-4); padding: 24px !important; }
    .page-desc {
      padding: 10px 16px 12px;
      font-size: 12.5px;
      color: var(--fg-3);
      border-bottom: 1px solid var(--divider);
    }
    .toast-msg {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.78);
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity .2s;
      z-index: 999;
      pointer-events: none;
      font-size: 13px;
    }
    .toast-msg.show { opacity: 1; }
    .dict-table-scroll { overflow-x: auto; }
  </style>
</head>
<body class="has-app-shell">
  <div class="app app-shell">
    <div class="app-grid-bg"></div>
    <aside id="sidebarMount"></aside>
    <div class="main">
      <header id="topbarMount"></header>
      <div class="content">
        <div class="card operation-header-card">
          <div class="page-desc">SOP 规则与投后智能体专用产品库，与资配底层产品（product_constraint）独立维护</div>
          <div class="tab-row" id="mainTabs">
            <button type="button" class="tab-btn active" data-tab="products">产品信息</button>
            <button type="button" class="tab-btn" data-tab="managers">管理人维护</button>
          </div>
        </div>
        <div id="tabContent"></div>
      </div>
    </div>
  </div>
  <div id="toast" class="toast-msg"></div>
  <script src="../js/common.js"></script>
  <script src="../js/app_shell.js"></script>
  <script src="../js/sop_product_library.js"></script>
  <script>
    initAppShell({ page: 'sop_product', title: 'SOP产品信息库', crumb: '运营管理 / SOP产品信息库', admin: true });
  </script>
</body>
</html>
