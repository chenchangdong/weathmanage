<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>批量任务 - 运营管理</title>
  <link rel="stylesheet" href="../css/app-shell.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .trigger-header-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 16px;
      padding: 16px 20px;
    }
    .trigger-header-card h2 {
      margin: 0 0 6px;
      font-size: 18px;
    }
    .trigger-header-card p {
      margin: 0;
      font-size: 13px;
      color: var(--fg-3);
      line-height: 1.6;
    }
    .trigger-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 12px;
      font-size: 12.5px;
      color: var(--fg-2);
    }
    .trigger-meta strong { color: var(--fg); }
    .search-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .search-bar h3 {
      margin: 0;
      font-size: 15px;
    }
    .form-grid { display: grid; gap: 14px; }
    .form-field label {
      display: block;
      font-size: 12px;
      color: var(--fg-3);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      background: var(--card);
      color: var(--fg);
      box-sizing: border-box;
    }
    .form-field textarea {
      min-height: 72px;
      resize: vertical;
    }
    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-hint {
      font-size: 12px;
      color: var(--fg-4);
      margin-top: 4px;
    }
    .table-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-link.danger { color: var(--red); }
    .empty-cell { text-align: center; color: var(--fg-4); padding: 24px !important; }
    .cron-code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      background: var(--bg-2);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .toast-msg {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.78);
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity .2s;
      z-index: 999;
      pointer-events: none;
      font-size: 13px;
    }
    .toast-msg.show { opacity: 1; }
  </style>
</head>
<body class="has-app-shell page-batch-trigger">
  <div class="app app-shell">
    <div class="app-grid-bg"></div>
    <aside id="sidebarMount"></aside>
    <div class="main">
      <header id="topbarMount"></header>
      <div class="content">
        <div class="trigger-header-card">
          <h2>批量任务</h2>
          <p>配置定时触发规则。当前支持投后 SOP 管理台的 6.1 事件跑批；保存后立即生效，无需重启服务。</p>
          <div class="trigger-meta" id="triggerMeta"></div>
        </div>
        <div class="card" id="triggerPanel">
          <div class="empty-cell">加载中…</div>
        </div>
      </div>
    </div>
  </div>
  <div id="toast" class="toast-msg"></div>
  <script src="../js/common.js"></script>
  <script src="../js/app_shell.js"></script>
  <script src="../js/sop_batch_trigger.js"></script>
  <script>
    initAppShell({
      page: 'sop_batch_trigger',
      title: '批量任务',
      crumb: '运营管理 / 批量任务',
      admin: true,
    });
    SopBatchTrigger.init();
  </script>
</body>
</html>
