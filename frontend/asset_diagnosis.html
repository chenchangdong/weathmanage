<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资产诊断 - 四笔钱智能投顾</title>
  <link rel="stylesheet" href="css/app-shell.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/advisor_chat_bootstrap.js"></script>
</head>
<body class="page-wealth-journey" data-advisor-dock>
  <div class="container container-diagnosis">
    <div class="page-header page-header-compact">
      <h1>资产诊断</h1>
      <p id="diagnosisSubtitle">结构化诊断 · 为智能资配做铺垫</p>
    </div>


    <div class="journey-step-bar">
      <a href="wealth_inventory.html" class="journey-step link">① 财富盘点</a>
      <span class="journey-step-arrow">→</span>
      <span class="journey-step active">② 资产诊断</span>
      <span class="journey-step-arrow">→</span>
      <a href="#" class="journey-step link" id="linkSmartAllocStep">③ 智能资配</a>
    </div>

    <div id="loading" class="loading">加载诊断数据…</div>
    <div id="emptyState" class="diagnosis-empty" style="display:none">
      <p>请从<a href="wealth_inventory.html">财富盘点</a>选择客户进入诊断。</p>
    </div>

    <div id="content" style="display:none">
      <section class="diagnosis-metrics-card">
        <div class="diagnosis-metrics-top">
          <div class="diagnosis-customer-block">
            <div class="diagnosis-customer-title-row">
              <h2 id="customerName">--</h2>
              <span id="metricFlags" class="diagnosis-inline-flags diagnosis-customer-flags"></span>
            </div>
            <p id="customerMeta" class="diagnosis-customer-meta">--</p>
          </div>
          <div class="diagnosis-metric-group diagnosis-metric-group-with-ai">
            <div class="diagnosis-metric">
              <span class="diagnosis-metric-label">总资产</span>
              <span class="diagnosis-metric-value" id="metricTotal">--</span>
              <span class="diagnosis-metric-sub" id="metricDate">--</span>
            </div>
            <button type="button" class="btn btn-ai-explain" id="btnAiAssetDiagnose">AI资产诊断</button>
          </div>
        </div>
        <div class="diagnosis-metrics-grid diagnosis-metrics-grid-duo">
          <div class="diagnosis-metric-panel">
            <div class="diagnosis-panel-title">收益指标</div>
            <div class="diagnosis-panel-row">
              <span>年化收益</span>
              <strong id="metricAnnual">--</strong>
            </div>
            <div class="diagnosis-panel-row">
              <span>本月收益</span>
              <strong id="metricMonth">--</strong>
            </div>
            <div class="diagnosis-panel-row muted">
              <span>模型预期年化</span>
              <span id="metricExpectRet">--</span>
            </div>
          </div>
          <div class="diagnosis-metric-panel">
            <div class="diagnosis-panel-title">风险指标（近1年）</div>
            <div class="diagnosis-panel-row">
              <span>最大回撤/浮亏</span>
              <strong id="metricLoss">--</strong>
            </div>
            <div class="diagnosis-panel-row">
              <span>年化波动率</span>
              <strong id="metricVol">--</strong>
            </div>
            <div class="diagnosis-panel-row muted">
              <span>模型预期波动 / 本金损失阈值</span>
              <span id="metricExpectRisk">--</span>
            </div>
          </div>
        </div>
      </section>

      <div class="diagnosis-layout">
        <aside class="diagnosis-sidebar">
          <div class="diagnosis-nav-item active">综合评分</div>
          <div class="diagnosis-nav-item">资产评价</div>
          <div class="diagnosis-nav-item">持仓评价</div>
          <div class="diagnosis-nav-item">收益评价</div>
          <div class="diagnosis-nav-item">风险评价</div>
          <div class="diagnosis-nav-item">行为评价</div>
        </aside>

        <main class="diagnosis-main">
          <section class="diagnosis-section">
            <h3 class="diagnosis-section-title">综合评分</h3>
            <div class="diagnosis-score-row">
              <div class="diagnosis-score-badge" id="compositeScore">--</div>
              <div class="diagnosis-score-detail">
                <p id="beatInvestors" class="diagnosis-beat">--</p>
                <p id="diagnosisConclusion" class="diagnosis-conclusion">--</p>
              </div>
              <div class="diagnosis-radar-wrap" id="radarWrap"></div>
            </div>
          </section>

          <section class="diagnosis-section">
            <h3 class="diagnosis-section-title">四笔钱配置对比</h3>
            <p class="diagnosis-section-desc">当前占比 vs 模型目标占比（投资规划资产类型阈值，保障类不计入）</p>
            <div id="fourMoneyCompare" class="fm-compare-list"></div>
          </section>

          <section class="diagnosis-section">
            <h3 class="diagnosis-section-title">诊断结论</h3>
            <ul id="conclusionList" class="diagnosis-conclusion-list"></ul>
          </section>
        </main>
      </div>

      <div class="diagnosis-actions">
        <a href="wealth_inventory.html" class="btn btn-primary btn-large">← 返回财富盘点</a>
        <button type="button" class="btn btn-primary btn-large" id="btnSmartAllocation">智能资配 →</button>
      </div>
    </div>
  </div>

  <div id="flagTooltip" class="flag-tooltip" style="display:none" role="tooltip"></div>
  <div id="toast" class="toast"></div>

  <script src="js/common.js"></script>
  <script src="js/journey_soft_nav.js"></script>
  <script src="js/app_shell.js"></script>
  <script src="js/wealth_journey.js"></script>
  <script src="js/journey_state.js"></script>
  <script src="js/pages/wealth_inventory_page.js"></script>
  <script src="js/pages/asset_diagnosis_page.js"></script>
  <script src="js/advisor_chat.js?v=20260622b"></script>
  <script>
    initAppShell({ page: 'asset_diagnosis', title: '资产诊断', crumb: '资产诊断' });
    var diagnosisData = null;
    syncCustomerContextFromUrl();
    AdvisorChat.initDockPage({ bindAssetDiagnose: true, bindHealthDiagnose: false, bindPlanExplain: false });
    AssetDiagnosisPage.boot();
  </script>
</body>
</html>
